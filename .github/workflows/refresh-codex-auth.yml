name: Refresh Codex auth.json

on:
  schedule:
    # Mon + Thu 03:00 UTC — well inside the ~8-day Codex staleness window
    - cron: "0 3 * * 1,4"
  workflow_dispatch:

concurrency:
  group: refresh-codex-auth
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Restore Codex auth.json from GH secret
        shell: bash
        env:
          CODEX_AUTH_JSON_BASE_64: ${{ secrets.CODEX_AUTH_JSON_BASE_64 }}
        run: |
          mkdir -p "$HOME/.codex"
          CLEAN=$(printf '%s' "$CODEX_AUTH_JSON_BASE_64" | tr -d '\n\r \t')
          echo "secret length: ${#CLEAN} (mod4=$((${#CLEAN} % 4)))"
          printf '%s' "$CLEAN" | base64 -d > "$HOME/.codex/auth.json"
          jq -r '.tokens.last_refresh // .last_refresh // "unknown"' "$HOME/.codex/auth.json" > /tmp/before_refresh

      - name: Install Codex CLI & enable user namespaces
        shell: bash
        run: |
          npm install -g @openai/codex

          current_userns="$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)"
          if [ -n "$current_userns" ] && [ "$current_userns" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          current_apparmor="$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)"
          if [ -n "$current_apparmor" ] && [ "$current_apparmor" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Trigger Codex token refresh
        shell: bash
        run: |
          codex exec --skip-git-repo-check --sandbox read-only \
            "Reply with exactly one word: refreshed" > /tmp/codex_out 2>&1 || {
              echo "Codex exec failed:"; cat /tmp/codex_out; exit 1;
          }
          cat /tmp/codex_out

      - name: Verify auth.json was refreshed
        shell: bash
        run: |
          test -s "$HOME/.codex/auth.json" || { echo "auth.json missing or empty"; exit 1; }
          jq empty "$HOME/.codex/auth.json" || { echo "auth.json is not valid JSON"; exit 1; }
          AFTER=$(jq -r '.tokens.last_refresh // .last_refresh // "unknown"' "$HOME/.codex/auth.json")
          BEFORE=$(cat /tmp/before_refresh)
          echo "last_refresh before: $BEFORE"
          echo "last_refresh after:  $AFTER"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "::warning::last_refresh did not change — token may already have been fresh, continuing"
          fi

      - name: Push refreshed auth.json back to GitHub Secrets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          NEW_B64=$(base64 -w0 < "$HOME/.codex/auth.json")
          printf '%s' "$NEW_B64" | gh secret set CODEX_AUTH_JSON_BASE_64 \
            --repo "$REPO" --body -
          echo "Updated CODEX_AUTH_JSON_BASE_64 in $REPO"
